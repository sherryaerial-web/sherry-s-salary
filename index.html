<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherry Aerial Studio 教師薪資核對系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #C5A059;
            --gold-dark: #8E7341;
            --white: #FFFFFF;
            --bg-light: #FBFBFB;
            --text-dark: #333333;
            --text-light: #999999;
            --border-color: #F0F0F0;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at 50% 0%, #FFFFFF 0%, #F2F0ED 100%);
            margin: 0; padding: 20px; color: var(--text-dark);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 460px; background: var(--white);
            padding: 40px 25px; border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(197, 160, 89, 0.1);
            text-align: center;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold-primary); letter-spacing: 2px; margin: 0 0 8px; }
        .sub-title { font-size: 13px; color: var(--text-light); margin-bottom: 40px; letter-spacing: 1px; }

        /* 登入區塊 */
        .login-box { display: flex; flex-direction: column; gap: 20px; }
        .input-group { text-align: left; }
        label { font-size: 12px; color: var(--gold-primary); font-weight: 500; margin-left: 5px; margin-bottom: 8px; display: block; }
        
        select, input {
            width: 100%; padding: 16px; border: 1px solid #EAEAEA; border-radius: 14px;
            font-size: 16px; background: #FAFAFA; transition: 0.3s; outline: none;
        }
        select:focus, input:focus { border-color: var(--gold-primary); background: #FFF; box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.08); }

        .btn-gold {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }
        .btn-gold:active { transform: scale(0.98); }

        /* 薪資結果頁 */
        #salaryDisplay { display: none; text-align: left; }
        .teacher-header { margin-bottom: 25px; border-left: 4px solid var(--gold-primary); padding-left: 15px; }
        .teacher-name { font-size: 20px; font-weight: 700; margin: 0; color: #111; }
        
        .main-card {
            background: linear-gradient(145deg, #FFFFFF, #FDFCFB);
            padding: 30px 20px; border-radius: 22px; margin-bottom: 25px;
            border: 1px solid rgba(197, 160, 89, 0.15); text-align: center;
        }
        .total-label { font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
        .total-amount { font-family: 'Playfair Display', serif; font-size: 44px; color: var(--gold-dark); font-weight: 700; }

        .summary-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #F8F8F8; font-size: 15px; }
        .summary-label { color: var(--text-light); }
        .summary-val { font-weight: 500; }

        /* 課程明細區 */
        .detail-title { font-size: 14px; font-weight: 700; color: var(--gold-primary); margin: 30px 0 15px; letter-spacing: 1px; }
        .class-card {
            background: #F9F9F9; padding: 16px; border-radius: 12px; margin-bottom: 12px;
            display: grid; grid-template-columns: 1fr auto; gap: 4px; border: 1px solid #F0F0F0;
        }
        .c-date { font-size: 11px; color: var(--text-light); grid-column: 1/3; }
        .c-name { font-size: 14px; font-weight: 500; }
        .c-fee { font-size: 14px; font-weight: 700; color: var(--gold-dark); text-align: right; }
        .c-info { font-size: 11px; color: var(--text-light); }

        /* 狀態樣式 */
        .status-badge { background: #E9F5EE; color: #2D7A4D; padding: 16px; border-radius: 14px; font-weight: 700; text-align: center; font-size: 14px; }
        
        #loader { display: none; color: var(--gold-primary); font-size: 14px; margin: 20px 0; text-align: center; }
        #errorTip { color: #CF4444; font-size: 13px; margin-top: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>SHERRY AERIAL STUDIO</h1>
    <div class="sub-title">教師薪資核對系統</div>

    <div id="loginSection" class="login-box">
        <div class="input-group">
            <label>Instructor Name / 老師姓名</label>
            <select id="teacherSelect"><option value="">系統連線中...</option></select>
        </div>
        <div class="input-group">
            <label>Password / 密碼</label>
            <input type="password" id="passwordInput" placeholder="身分證號碼末四碼">
        </div>
        <button class="btn-gold" onclick="login()">LOGIN</button>
        <div id="errorTip"></div>
        <div id="loader">處理中...</div>
    </div>

    <div id="salaryDisplay">
        <div class="teacher-header">
            <p class="teacher-name" id="displayName"></p>
            <p style="font-size: 11px; color: #AAA; margin: 4px 0 0;">Statement for the current month</p>
        </div>
        
        <div class="main-card">
            <div class="total-label">本月核算應領總額</div>
            <div class="total-amount" id="totalPay">$0</div>
        </div>

        <div class="summary-row"><span class="summary-label">鐘點費小計</span><span id="basePay"></span></div>
        <div class="summary-row"><span class="summary-label">獎金</span><span id="bonusPay"></span></div>
        <div class="summary-row" id="fixedPayRow"><span class="summary-label">固定加給 / 扣項</span><span id="fixedPay"></span></div>

        <div class="detail-title">課程明細 DETAILS</div>
        <div id="classList"></div>

        <div id="confirmArea" style="margin-top: 40px;">
            <button class="btn-gold" style="background: #2D7A4D; box-shadow: 0 10px 20px rgba(45, 122, 77, 0.2);" onclick="confirmSalary()">確認薪資無誤</button>
        </div>
        <div id="confirmedMsg" style="display:none; margin-top: 40px;">
            <div class="status-badge">✓ 已完成線上核對</div>
        </div>

        <button onclick="location.reload()" style="background:none; border:none; color:#BBB; font-size:12px; width:100%; margin-top:40px; cursor:pointer; text-decoration:underline;">安全登出 Logout</button>
    </div>
</div>

<script>
    // ⚠️ 務必替換為您的 GAS 網址 (/exec 結尾)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMMrzKOIhEOeDpHP74910qzfd-HAPnUgq0FTAImHUHCODT2DcnGZmyypS4fdOx9pYAaA/exec"; 

    window.onload = () => {
        fetch(`${SCRIPT_URL}?action=getTeachers`)
            .then(res => res.json())
            .then(res => {
                const sel = document.getElementById('teacherSelect');
                sel.innerHTML = '<option value="">-- 請選擇您的姓名 --</option>';
                res.data.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
            })
            .catch(() => {
                const tip = document.getElementById('errorTip');
                tip.style.display = 'block';
                tip.innerText = "無法連線至後台，請重新整理網頁。";
            });
    };

    function login() {
        const name = document.getElementById('teacherSelect').value;
        const password = document.getElementById('passwordInput').value;
        if(!name || !password) return;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('errorTip').style.display = 'none';

        fetch(`${SCRIPT_URL}?action=login&name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`)
            .then(res => res.json())
            .then(res => {
                document.getElementById('loader').style.display = 'none';
                if(res.success) {
                    renderSalary(res.data);
                } else {
                    const tip = document.getElementById('errorTip');
                    tip.style.display = 'block';
                    tip.innerText = "驗證失敗，請檢查密碼是否正確。";
                }
            });
    }

    function renderSalary(data) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('salaryDisplay').style.display = 'block';
        
        // 核心修復：強制將資料轉換為乾淨的數字，過濾掉逗號與非數值字元
        const totalNum = Number(String(data.total || 0).replace(/,/g, ''));
        const baseNum = Number(String(data.base || 0).replace(/,/g, ''));
        const bonusNum = Number(String(data.bonus || 0).replace(/,/g, ''));
        const fixedNum = Number(String(data.fixed || 0).replace(/,/g, ''));

        // 渲染基本資訊
        document.getElementById('displayName').innerText = data.name + " 老師";
        document.getElementById('totalPay').innerText = "$" + totalNum.toLocaleString();
        document.getElementById('basePay').innerText = "$" + baseNum.toLocaleString();
        document.getElementById('bonusPay').innerText = "$" + bonusNum.toLocaleString();

        // 判斷是否顯示「固定加給 / 扣項」
        const fixedPayRow = document.getElementById('fixedPayRow');
        if (fixedNum !== 0) {
            fixedPayRow.style.display = 'flex'; // 有數值才顯示
            document.getElementById('fixedPay').innerText = "$" + fixedNum.toLocaleString();
        } else {
            fixedPayRow.style.display = 'none'; // 為 0 則整行隱藏
        }

        // 渲染課程明細
        const listDiv = document.getElementById('classList');
        listDiv.innerHTML = "";
        if(data.classes && data.classes.length > 0) {
            data.classes.forEach(c => {
                listDiv.innerHTML += `
                    <div class="class-card">
                        <div class="c-date">${c.date}</div>
                        <div class="c-name">${c.title}</div>
                        <div class="c-fee">$${Math.round(c.fee).toLocaleString()}</div>
                        <div class="c-info">出席人數: ${c.status}</div>
                    </div>
                `;
            });
        } else {
            listDiv.innerHTML = '<p style="font-size:12px; color:#AAA;">暫無明細資料</p>';
        }

        // 狀態切換邏輯
        if(data.isConfirmed) {
            document.getElementById('confirmArea').style.display = 'none';
            document.getElementById('confirmedMsg').style.display = 'block';
        } else {
            document.getElementById('confirmArea').style.display = 'block';
            document.getElementById('confirmedMsg').style.display = 'none';
        }
    }

    function confirmSalary() {
        if(!confirm("您好，點擊確認後表示您已核對本月薪資明細無誤。")) return;
        const name = document.getElementById('teacherSelect').value;
        document.getElementById('loader').style.display = 'block';

        fetch(`${SCRIPT_URL}?action=confirm&name=${encodeURIComponent(name)}`)
            .then(res => res.json())
            .then(res => {
                document.getElementById('loader').style.display = 'none';
                if(res.success) {
                    document.getElementById('confirmArea').style.display = 'none';
                    document.getElementById('confirmedMsg').style.display = 'block';
                    alert("已記錄您核對完成，謝謝老師！"); // 依需求修改提示語
                }
            });
    }
</script>
</body>
</html>
