<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherry Aerial 老師薪資查詢系統</title>
    <style>
        :root {
            --primary-color: #6a89cc;
            --secondary-color: #82ccdd;
            --accent-color: #e55039;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #4a4a4a; margin-bottom: 25px; }

        /* 登入區塊 */
        .login-box { display: flex; flex-direction: column; gap: 15px; }
        select, input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; }

        /* 薪資內容區塊 */
        #salaryDisplay { display: none; margin-top: 20px; }
        .summary-card {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .summary-item { display: flex; justify-content: space-between; margin: 8px 0; }
        .total-amount { font-size: 1.2em; font-weight: bold; color: var(--accent-color); border-top: 1px solid #ccc; pt: 10px; }

        /* 課表清單 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #fafafa; }

        .status-confirmed { color: #2ecc71; font-weight: bold; text-align: center; }
        #confirmBtn { width: 100%; background-color: #2ecc71; margin-top: 15px; }

        /* 讀取動畫 */
        .loading { display: none; text-align: center; margin: 10px 0; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧘 Sherry Aerial 薪資查詢</h2>

    <div id="loginSection" class="login-box">
        <label>請選擇老師姓名：</label>
        <select id="teacherSelect">
            <option value="">載入中...</option>
        </select>
        <input type="password" id="passwordInput" placeholder="請輸入密碼">
        <button onclick="login()">登入查詢</button>
        <div id="loginMsg" style="color:red; font-size:14px; text-align:center;"></div>
    </div>

    <div id="loader" class="loading">處理中，請稍候...</div>

    <div id="salaryDisplay">
        <div class="summary-card">
            <h3 id="displayName">老師</h3>
            <div class="summary-item"><span>鐘點費小計：</span><span id="basePay">$0</span></div>
            <div class="summary-item"><span>獎金：</span><span id="bonusPay">$0</span></div>
            <div class="summary-item"><span>固定項目/扣項：</span><span id="fixedPay">$0</span></div>
            <div class="summary-item total-amount"><span>應領總薪資：</span><span id="totalPay">$0</span></div>
        </div>

        <h4>本月課堂明細</h4>
        <div style="overflow-x: auto;">
            <table id="classTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>課程內容</th>
                        <th>人數</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="confirmArea">
            <button id="confirmBtn" onclick="confirmSalary()">確認薪資無誤</button>
        </div>
        <div id="confirmedMsg" class="status-confirmed" style="display:none; margin-top:15px;">✅ 您已完成本月確認</div>
        
        <button style="width:100%; background:#95a5a6; margin-top:10px;" onclick="location.reload()">登出</button>
    </div>
</div>

<script>
    // ⚠️ 請在此處替換為您的 GAS Web App URL
    const SCRIPT_URL = "您的_GOOGLE_APPS_SCRIPT_網址_不要留空";

    // 1. 初始化：抓取老師名單
    window.onload = function() {
        fetch(`${SCRIPT_URL}?action=getTeachers`)
            .then(res => res.json())
            .then(response => {
                const select = document.getElementById('teacherSelect');
                select.innerHTML = '<option value="">-- 請選擇 --</option>';
                response.data.forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = name;
                    opt.innerHTML = name;
                    select.appendChild(opt);
                });
            })
            .catch(err => alert("無法連線至後台，請檢查網址與權限設定。"));
    };

    // 2. 登入功能
    function login() {
        const name = document.getElementById('teacherSelect').value;
        const password = document.getElementById('passwordInput').value;
        const msg = document.getElementById('loginMsg');
        
        if(!name || !password) { msg.innerText = "請輸入姓名與密碼"; return; }

        toggleLoading(true);
        msg.innerText = "";

        fetch(`${SCRIPT_URL}?action=login&name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`)
            .then(res => res.json())
            .then(response => {
                toggleLoading(false);
                if(response.success) {
                    showSalary(response.data);
                } else {
                    msg.innerText = "登入失敗：" + response.message;
                }
            });
    }

    // 3. 顯示薪資資料
    function showSalary(data) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('salaryDisplay').style.display = 'block';

        document.getElementById('displayName').innerText = data.name + " 老師";
        document.getElementById('basePay').innerText = "$" + data.base.toLocaleString();
        document.getElementById('bonusPay').innerText = "$" + data.bonus.toLocaleString();
        document.getElementById('totalPay').innerText = "$" + data.total.toLocaleString();
        
        // 處理固定項目 (如果有回傳的話，這裡我們預留欄位)
        // 註：data 結構需對應後台回傳
        
        const tbody = document.querySelector('#classTable tbody');
        tbody.innerHTML = "";
        data.classes.forEach(c => {
            let row = `<tr>
                <td>${c.date}</td>
                <td>${c.title}</td>
                <td>${c.status}</td>
                <td>$${c.fee}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // 處理確認狀態
        if(data.isConfirmed) {
            document.getElementById('confirmArea').style.display = 'none';
            document.getElementById('confirmedMsg').style.display = 'block';
        }
    }

    // 4. 確認薪資
    function confirmSalary() {
        if(!confirm("確定薪資明細皆正確嗎？")) return;
        
        const name = document.getElementById('teacherSelect').value;
        toggleLoading(true);

        fetch(`${SCRIPT_URL}?action=confirm&name=${encodeURIComponent(name)}`)
            .then(res => res.json())
            .then(response => {
                toggleLoading(false);
                if(response.success) {
                    document.getElementById('confirmArea').style.display = 'none';
                    document.getElementById('confirmedMsg').style.display = 'block';
                    alert("感謝您的確認！");
                }
            });
    }

    function toggleLoading(show) {
        document.getElementById('loader').style.display = show ? 'block' : 'none';
    }
</script>

</body>
</html>
